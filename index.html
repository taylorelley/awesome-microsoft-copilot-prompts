<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="454 production-tested Microsoft Copilot prompts — searchable, filterable, copy-ready.">
<title>Copilot Prompt Library</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
/* ─── Reset & Variables ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --border: #E2E8F0;
  --primary: #4F46E5;
  --primary-50: #EEF2FF;
  --primary-100: #E0E7FF;
  --text: #0F172A;
  --text-2: #475569;
  --text-3: #94A3B8;
  --code-bg: #F1F5F9;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.06);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --header-h: 60px;
  --sidebar-w: 248px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Inter', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Fira Mono', ui-monospace, monospace;
  --transition: 150ms ease;
}

[data-theme="dark"] {
  --bg: #0F172A;
  --surface: #1E293B;
  --border: #334155;
  --primary: #6366F1;
  --primary-50: #1E1B4B;
  --primary-100: #312E81;
  --text: #F8FAFC;
  --text-2: #CBD5E1;
  --text-3: #94A3B8;
  --code-bg: #0B1221;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.5), 0 4px 10px rgba(0,0,0,.4);
}

html { height: 100%; height: 100dvh; }

body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  transition: background-color 200ms ease, color 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
}

.header, .sidebar, .main, .modal, .modal-backdrop, .prompt-code, .prompt-context, .tag, .meta-tag, .empty-icon, .count-badge, .nav-count, .search-clear, .sidebar-toggle, .toast, .card-preview, .empty, .modal-header, .modal-body, .modal-footer, .toolbar, .group-label, .logo-text, .badge-text, .meta-label, .meta-value, .modal-title, .modal-breadcrumb, .prompt-label, .card-title, .card-desc, .card-badge, .modal-header-top {
  transition: background-color 200ms ease, color 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
}

/* ─── Header ─────────────────────────────────────────────────────── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  z-index: 100;
  backdrop-filter: blur(8px);
}

.header-start {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
  text-decoration: none;
  color: var(--text);
}

.logo-icon {
  width: 30px; height: 30px;
  background: var(--primary);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-icon svg { width: 16px; height: 16px; fill: white; }

.logo-text {
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
  color: var(--text);
  white-space: nowrap;
}

.logo-text span {
  color: var(--primary);
}

.header-search {
  max-width: 520px;
  width: 100%;
  margin: 0 auto;
  position: relative;
}

.header-search svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  stroke: var(--text-3);
  flex-shrink: 0;
  pointer-events: none;
}

.search-input {
  width: 100%;
  height: 38px;
  padding: 0 12px 0 38px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition), background-color 200ms ease, color 200ms ease;
}

.search-input::placeholder { color: var(--text-3); }

.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-50);
  background: var(--surface);
}

.search-clear {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 20px;
  border: none;
  background: var(--text-3);
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
  line-height: 1;
  padding: 0;
  font-weight: 700;
}

.search-clear.visible { display: flex; }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-end;
  flex-shrink: 0;
}

.count-badge {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  white-space: nowrap;
}

.btn-icon {
  width: 34px; height: 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}

.btn-icon:hover { background: var(--primary-50); color: var(--primary); border-color: var(--primary-100); }
.btn-icon svg { width: 16px; height: 16px; }

#install-btn { display: none; }
#install-btn.visible { display: flex; }

/* ─── Layout ──────────────────────────────────────────────────────── */
.layout {
  display: flex;
  height: 100dvh;
  padding-top: var(--header-h);
}

/* ─── Sidebar ─────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0 40px;
  scroll-behavior: smooth;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar-all {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 14px;
  margin: 0 8px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  font-weight: 600;
  color: var(--text);
  font-size: 13.5px;
}

.sidebar-all:hover, .sidebar-all.active {
  background: var(--primary-50);
  color: var(--primary);
}

.sidebar-all .nav-count {
  background: var(--primary);
  color: white;
}

.sidebar-all.active .nav-count {
  background: var(--primary);
}

.sidebar-section { margin-bottom: 8px; }
.sidebar-group { margin-bottom: 4px; }

.group-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 10px 22px 4px;
  display: block;
}

.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 14px 6px 18px;
  margin: 0 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  color: var(--text-2);
  font-size: 13px;
  gap: 8px;
}

.nav-item:hover {
  background: var(--bg);
  color: var(--text);
}

.nav-item.active {
  background: var(--primary-50);
  color: var(--primary);
  font-weight: 600;
}

.nav-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.nav-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.nav-count {
  font-size: 11px;
  font-weight: 600;
  background: var(--code-bg);
  color: var(--text-3);
  border-radius: 10px;
  padding: 1px 7px;
  flex-shrink: 0;
}

.nav-item.active .nav-count {
  background: var(--primary-100);
  color: var(--primary);
}

/* ─── Main Content ────────────────────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}

.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

/* ─── Toolbar ─────────────────────────────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.toolbar-title {
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
  margin-right: 4px;
}

.toolbar-count {
  font-size: 13px;
  color: var(--text-3);
  font-weight: 400;
}

.toolbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.tag-filter {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.active-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  background: var(--primary-50);
  color: var(--primary);
  border-radius: 20px;
  padding: 3px 10px 3px 10px;
  cursor: pointer;
  border: 1px solid var(--primary-100);
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}

.active-tag:hover { background: var(--primary-100); }
.active-tag svg { width: 12px; height: 12px; stroke: currentColor; }

/* ─── Grid ────────────────────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 14px;
  align-content: start;
}

/* ─── Card ────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: box-shadow var(--transition), border-color var(--transition), transform 150ms ease, background-color 200ms ease, color 200ms ease;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  min-height: 0;
}

.card:hover {
  box-shadow: var(--shadow-lg);
  border-color: #CBD5E1;
  transform: translateY(-1px);
}

[data-theme="dark"] .card:hover { border-color: #475569; }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.card-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  min-width: 0;
}

.badge-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.badge-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Variant count badge on cards */
.variant-count {
  font-size: 10px;
  font-weight: 600;
  color: var(--primary);
  background: var(--primary-50);
  padding: 2px 6px;
  border-radius: 10px;
  flex-shrink: 0;
  margin-left: 4px;
}

[data-theme="dark"] .variant-count {
  background: rgba(99, 102, 241, 0.15);
}

.copy-btn {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3);
  flex-shrink: 0;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
  opacity: 0;
}

.card:hover .copy-btn { opacity: 1; }

.copy-btn:hover {
  background: var(--primary-50);
  color: var(--primary);
  border-color: var(--primary-100);
}

.copy-btn.copied {
  background: #DCFCE7;
  color: #16A34A;
  border-color: #BBF7D0;
  opacity: 1;
}

[data-theme="dark"] .copy-btn.copied {
  background: #14532D;
  color: #86EFAC;
  border-color: #166534;
}

.copy-btn svg { width: 13px; height: 13px; }

.card-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  line-height: 1.35;
}

.card-desc {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-preview {
  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.55;
  color: var(--text-2);
  background: var(--code-bg);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  white-space: pre-wrap;
  word-break: break-word;
}

.card-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.tag {
  font-size: 11px;
  font-weight: 500;
  background: var(--code-bg);
  color: var(--text-3);
  border-radius: 4px;
  padding: 2px 7px;
}

/* ─── Empty State ─────────────────────────────────────────────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 12px;
  color: var(--text-3);
  text-align: center;
}

.empty-icon {
  width: 48px; height: 48px;
  background: var(--code-bg);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.empty-icon svg { width: 22px; height: 22px; stroke: var(--text-3); }
.empty h3 { font-size: 16px; font-weight: 600; color: var(--text-2); }
.empty p { font-size: 13px; }

/* ─── Modal ───────────────────────────────────────────────────────── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.5);
  z-index: 200;
  backdrop-filter: blur(2px);
  align-items: flex-end;
  justify-content: center;
}

.modal-backdrop.open {
  display: flex;
}

[data-theme="dark"] .modal-backdrop { background: rgba(0, 0, 0, 0.6); }

@media (min-width: 640px) {
  .modal-backdrop { align-items: center; }
}

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  width: 100%;
  max-width: 680px;
  max-height: 90dvh;
  display: flex;
  flex-direction: column;
  animation: slideUp 200ms ease;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}

@media (min-width: 640px) {
  .modal { border-radius: var(--radius-lg); max-height: 85vh; }
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.modal-breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 8px;
}

.modal-breadcrumb span { color: var(--text-3); }
.modal-breadcrumb b { color: var(--text-2); font-weight: 500; }

.modal-header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.modal-close {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3);
  flex-shrink: 0;
  font-size: 16px;
  line-height: 1;
  transition: background var(--transition), color var(--transition);
}

.modal-close:hover { background: #FEF2F2; color: #EF4444; }

[data-theme="dark"] .modal-close:hover { background: #450A0A; color: #FCA5A5; }

.modal-body {
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.meta-row {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.meta-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-3);
}

.meta-value {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.5;
}

.meta-tags {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.meta-tag {
  font-size: 12px;
  font-weight: 500;
  background: var(--code-bg);
  color: var(--text-2);
  border-radius: 4px;
  padding: 3px 8px;
}

/* Variant selector in modal */
.variant-selector {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 12px;
  background: var(--code-bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.variant-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-3);
}

.variant-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.variant-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-2);
  transition: all var(--transition);
}

.variant-btn:hover {
  border-color: var(--primary-200);
  background: var(--primary-50);
  color: var(--text);
}

.variant-btn.active {
  border-color: var(--primary);
  background: var(--primary-50);
  color: var(--primary);
  font-weight: 600;
}

[data-theme="dark"] .variant-btn:hover {
  border-color: var(--primary-300);
  background: rgba(99, 102, 241, 0.1);
}

[data-theme="dark"] .variant-btn.active {
  border-color: var(--primary);
  background: rgba(99, 102, 241, 0.15);
}

.variant-app {
  font-weight: 500;
}

.variant-role {
  color: var(--text-3);
  font-size: 11px;
}

.variant-btn.active .variant-role {
  color: var(--primary);
  opacity: 0.8;
}

.prompt-block {
  position: relative;
}

.prompt-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-3);
  margin-bottom: 8px;
}

.prompt-code {
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text);
  background: var(--code-bg);
  border-radius: var(--radius-sm);
  padding: 16px;
  white-space: pre-wrap;
  word-break: break-word;
  border: 1px solid var(--border);
}

.prompt-context {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-2);
  background: var(--primary-50);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  white-space: pre-wrap;
  word-break: break-word;
  border: 1px solid var(--primary-100);
}

.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-copy-full {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  padding: 0 18px;
  height: 38px;
  font-family: var(--font);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform 100ms;
}

.btn-copy-full:hover { background: #4338CA; }

[data-theme="dark"] .btn-copy-full:hover { background: #4F46E5; }
.btn-copy-full:active { transform: scale(0.98); }
.btn-copy-full.copied { background: #16A34A; }
.btn-copy-full svg { width: 15px; height: 15px; flex-shrink: 0; }

.btn-secondary {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  color: var(--text-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 14px;
  height: 38px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition);
}

.btn-secondary:hover { background: var(--bg); color: var(--text); }

/* ─── Toast ───────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: #0F172A;
  color: white;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: var(--radius);
  opacity: 0;
  transition: opacity 200ms, transform 200ms;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

[data-theme="dark"] .toast { background: #1E293B; color: #F8FAFC; }

/* ─── Mobile sidebar toggle ───────────────────────────────────────── */
.sidebar-toggle {
  display: none;
  width: 34px; height: 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  flex-shrink: 0;
}

.sidebar-toggle svg { width: 16px; height: 16px; }

@media (max-width: 768px) {
  .sidebar-toggle { display: flex; }
  .logo-text { display: none; }
  .count-badge { display: none; }

  .sidebar {
    position: fixed;
    top: var(--header-h);
    left: 0;
    bottom: 0;
    z-index: 150;
    transform: translateX(-100%);
    transition: transform 200ms ease;
    box-shadow: var(--shadow-lg);
  }

  .sidebar.open { transform: translateX(0); }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    top: var(--header-h);
    background: rgba(15, 23, 42, 0.4);
    z-index: 140;
  }

  .sidebar-overlay.open { display: block; }

  [data-theme="dark"] .sidebar-overlay { background: rgba(0, 0, 0, 0.5); }

  .main { padding: 16px; }
  .grid { grid-template-columns: 1fr; }
  .copy-btn { opacity: 1; }
}

@media (max-width: 480px) {
  .header { padding: 0 12px; gap: 8px; }
  .header-search { max-width: none; }
}
</style>
</head>

<!-- Layout -->

<!-- Toast -->
<div class="toast" id="toast">Copied to clipboard</div>

<script src="data.js"></script>
<script>
// ─── Merge custom prompts from localStorage ────────────────────────
(function mergeCustomPrompts() {
  try {
    const custom = JSON.parse(localStorage.getItem('custom_prompts') || '[]');
    const deleted = JSON.parse(localStorage.getItem('deleted_prompt_ids') || '[]');
    if (!custom.length && !deleted.length) return;

    // Filter out deleted built-in prompts
    const builtIn = PROMPTS_DATA.filter(p => !deleted.includes(p.id));

    // Override built-in with custom prompts that share an id
    const builtInIds = new Set(builtIn.map(p => p.id));
    const customNew = custom.filter(p => !builtInIds.has(p.id));

    const overridden = builtIn.map(p => {
      const override = custom.find(c => c.id === p.id);
      return override || p;
    });

    // Replace PROMPTS_DATA in place so all references work
    PROMPTS_DATA.length = 0;
    PROMPTS_DATA.push(...overridden, ...customNew);
  } catch (e) {
    console.error('Failed to load custom prompts:', e);
  }
})();

// ─── State ─────────────────────────────────────────────────────────
const state = {
  search: '',
  filterType: null,   // 'app' or 'role'
  filterValue: null,   // app key or role key
  filtered: PROMPTS_DATA,
  activePrompt: null,
};

// ─── Utilities ─────────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

async function copyText(text, btnEl) {
  try {
    await navigator.clipboard.writeText(text);
    if (btnEl) {
      btnEl.classList.add('copied');
      setTimeout(() => btnEl.classList.remove('copied'), 1800);
    }
    showToast('Copied to clipboard');
  } catch {
    showToast('Press Ctrl+C to copy');
  }
}

// ─── Sidebar ───────────────────────────────────────────────────────
function buildSidebar() {
  // Compute live counts from PROMPTS_DATA
  const appCounts = {};
  const roleCounts = {};
  for (const p of PROMPTS_DATA) {
    appCounts[p.app] = (appCounts[p.app] || 0) + 1;
    roleCounts[p.role] = (roleCounts[p.role] || 0) + 1;
  }

  // Update "All Prompts" count
  const allCountEl = document.getElementById('nav-all-count');
  if (allCountEl) allCountEl.textContent = PROMPTS_DATA.length;

  // Build "Browse by App" section from APPS_META
  const appsContainer = document.getElementById('nav-apps');
  let appsHtml = '';
  for (const [key, meta] of Object.entries(APPS_META)) {
    const count = appCounts[key] || 0;
    appsHtml += `
      <div class="nav-item" data-type="app" data-value="${esc(key)}"
           onclick="setFilter('app', '${esc(key)}')">
        <span class="nav-dot" style="background:${meta.color}"></span>
        <span class="nav-label">${esc(meta.display)}</span>
        <span class="nav-count">${count}</span>
      </div>`;
  }
  appsContainer.innerHTML = appsHtml;

  // Build "Browse by Role" section from ROLES_META
  const rolesContainer = document.getElementById('nav-roles');
  let rolesHtml = '';
  for (const [key, meta] of Object.entries(ROLES_META)) {
    const count = roleCounts[key] || 0;
    rolesHtml += `
      <div class="nav-item" data-type="role" data-value="${esc(key)}"
           onclick="setFilter('role', '${esc(key)}')">
        <span class="nav-label">${esc(meta.display)}</span>
        <span class="nav-count">${count}</span>
      </div>`;
  }
  rolesContainer.innerHTML = rolesHtml;
}

function updateSidebarActive() {
  document.getElementById('nav-all').classList.toggle('active', !state.filterType && !state.filterValue);
  document.querySelectorAll('.nav-item').forEach(el => {
    const active = el.dataset.type === state.filterType && el.dataset.value === state.filterValue;
    el.classList.toggle('active', active);
  });
}

function clearFilter() {
  state.filterType = null;
  state.filterValue = null;
  applyFilter();
  updateSidebarActive();
  updateActiveFilters();
  closeSidebarMobile();
  document.getElementById('main').scrollTop = 0;
}

// ─── Filtering ─────────────────────────────────────────────────────
function setFilter(type, value) {
  state.filterType = type;
  state.filterValue = value;
  applyFilter();
  updateSidebarActive();
  updateActiveFilters();
  closeSidebarMobile();
  document.getElementById('main').scrollTop = 0;
}

function applyFilter() {
  const q = state.search.trim().toLowerCase();
  let results = PROMPTS_DATA;

  if (q) {
    results = results.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.prompt.toLowerCase().includes(q) ||
      p.useCase.toLowerCase().includes(q) ||
      p.subcategory.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q)) ||
      p.personas.some(pe => pe.toLowerCase().includes(q))
    );

    // Sort by relevance: title match first, then useCase, then tags/personas, then prompt
    results.sort((a, b) => {
      const aTitle = a.title.toLowerCase().includes(q) ? 1 : 0;
      const bTitle = b.title.toLowerCase().includes(q) ? 1 : 0;
      if (aTitle !== bTitle) return bTitle - aTitle;

      const aUseCase = a.useCase.toLowerCase().includes(q) ? 1 : 0;
      const bUseCase = b.useCase.toLowerCase().includes(q) ? 1 : 0;
      if (aUseCase !== bUseCase) return bUseCase - aUseCase;

      const aTags = a.tags.some(t => t.toLowerCase().includes(q)) || a.personas.some(pe => pe.toLowerCase().includes(q)) ? 1 : 0;
      const bTags = b.tags.some(t => t.toLowerCase().includes(q)) || b.personas.some(pe => pe.toLowerCase().includes(q)) ? 1 : 0;
      if (aTags !== bTags) return bTags - aTags;

      return 0;
    });
  }

  if (state.filterType === 'app' && state.filterValue) {
    results = results.filter(p => p.app === state.filterValue);
  } else if (state.filterType === 'role' && state.filterValue) {
    results = results.filter(p => p.role === state.filterValue);
  }

  // Deduplicate: keep only primary variant per groupId
  const seenGroups = new Set();
  results = results.filter(p => {
    if (!p.groupId) return true; // No groupId, keep as-is
    if (seenGroups.has(p.groupId)) return false; // Already seen this group
    seenGroups.add(p.groupId);
    return p.isPrimary; // Keep primary variant
  });

  // Shuffle when not searching (covers: no filter, filter only)
  if (!q) {
    results = shuffle(results);
  }

  state.filtered = results;
  renderCards();
  updateCount();
}

function updateCount() {
  const countEl = document.getElementById('toolbar-count');
  const titleEl = document.getElementById('toolbar-title');
  if (countEl) countEl.textContent = `${state.filtered.length} prompts`;
  if (titleEl) {
    if (!state.filterType) {
      titleEl.textContent = 'All Prompts';
    } else {
      const meta = state.filterType === 'app' ? APPS_META[state.filterValue] : ROLES_META[state.filterValue];
      titleEl.textContent = meta ? meta.display : state.filterValue;
    }
  }
}

function updateActiveFilters() {
  const container = document.getElementById('tag-filter');
  if (!container) return;
  if (!state.filterType || !state.filterValue) {
    container.innerHTML = '';
    return;
  }
  const meta = state.filterType === 'app' ? APPS_META[state.filterValue] : ROLES_META[state.filterValue];
  const label = meta ? meta.display : state.filterValue;
  container.innerHTML = `
    <button type="button" class="active-tag" onclick="clearFilter()"
            aria-label="Clear ${esc(label)} filter">
      ${esc(label)}
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>`;
}

// ─── Search ────────────────────────────────────────────────────────
let searchDebounce;
document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  document.getElementById('search-clear').classList.toggle('visible', state.search.length > 0);
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(applyFilter, 120);
});

document.getElementById('search-clear').addEventListener('click', () => {
  const inp = document.getElementById('search');
  inp.value = '';
  state.search = '';
  document.getElementById('search-clear').classList.remove('visible');
  applyFilter();
  inp.focus();
});

// ─── Cards ─────────────────────────────────────────────────────────
const COPY_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
</svg>`;

const CHECK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
  <polyline points="20 6 9 17 4 12"/>
</svg>`;

function cardHTML(p) {
  const preview = p.prompt.length > 160 ? p.prompt.slice(0, 157) + '…' : p.prompt;
  const visibleTags = p.tags.slice(0, 4);

  // Build category badges for all variants
  let badgesHTML = '';
  if (p.variantCount > 1 && p.variantSlugs) {
    // Collect all unique app/role combinations from variants
    const variantApps = new Set();
    const variantRoles = new Set();
    for (const slug of p.variantSlugs) {
      const variant = PROMPTS_DATA.find(x => x.id === slug);
      if (variant) {
        variantApps.add(variant.app);
        variantRoles.add(variant.role);
      }
    }
    // Show primary badge + variant count
    const appDisplay = APPS_META[p.app] ? APPS_META[p.app].display : p.group;
    const roleDisplay = ROLES_META[p.role] ? ROLES_META[p.role].display : p.category;
    badgesHTML = `
      <div class="card-badge">
        <span class="badge-dot" style="background:${p.color}"></span>
        <span class="badge-text">${esc(roleDisplay)}</span>
      </div>
      <span class="variant-count" title="${p.variantCount} variants across ${variantApps.size} app(s)">+${p.variantCount - 1}</span>`;
  } else {
    badgesHTML = `
      <div class="card-badge">
        <span class="badge-dot" style="background:${p.color}"></span>
        <span class="badge-text">${esc(p.category)}</span>
      </div>`;
  }

  return `
    <div class="card" onclick="openModal('${esc(p.id)}')" role="article" tabindex="0"
         onkeydown="if(event.key==='Enter')openModal('${esc(p.id)}')">
      <div class="card-top">
        ${badgesHTML}
        <button class="copy-btn" onclick="event.stopPropagation();copyCard('${esc(p.id)}',this)"
                title="Copy prompt" aria-label="Copy prompt">${COPY_ICON}</button>
      </div>
      <div class="card-title">${esc(p.title)}</div>
      ${p.useCase ? `<div class="card-desc">${esc(p.useCase)}</div>` : ''}
      <pre class="card-preview">${esc(preview)}</pre>
    </div>`;
}

function renderCards() {
  const grid = document.getElementById('grid');
  if (!state.filtered.length) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </div>
        <h3>No prompts found</h3>
        <p>Try different keywords or clear the filter</p>
      </div>`;
    return;
  }
  grid.innerHTML = state.filtered.map(cardHTML).join('');
}

function copyCard(id, btn) {
  const p = PROMPTS_DATA.find(x => x.id === id);
  if (!p) return;
  btn.innerHTML = CHECK_ICON;
  copyText(p.prompt, btn).then(() => {
    setTimeout(() => { btn.innerHTML = COPY_ICON; }, 1800);
  });
}

// ─── Modal ─────────────────────────────────────────────────────────
function openModal(id) {
  const p = PROMPTS_DATA.find(x => x.id === id);
  if (!p) return;
  state.activePrompt = p;

  document.getElementById('modal-title').textContent = p.title;

  // Breadcrumb: App › Role › Difficulty
  const bc = document.getElementById('modal-breadcrumb');
  const appDisplay = APPS_META[p.app] ? APPS_META[p.app].display : p.group;
  const roleDisplay = ROLES_META[p.role] ? ROLES_META[p.role].display : p.category;
  const diffDisplay = p.difficulty ? p.difficulty.charAt(0).toUpperCase() + p.difficulty.slice(1) : p.subcategory;
  bc.innerHTML = `<b>${esc(appDisplay)}</b><span>›</span><b>${esc(roleDisplay)}</b>` +
    (diffDisplay ? `<span>›</span><span>${esc(diffDisplay)}</span>` : '');

  // Variant selector (if multiple variants exist)
  let variantSelectorHTML = '';
  if (p.variantCount > 1 && p.variantSlugs && p.variantSlugs.length > 1) {
    const variants = p.variantSlugs.map(slug => {
      const v = PROMPTS_DATA.find(x => x.id === slug);
      if (!v) return '';
      const vApp = APPS_META[v.app] ? APPS_META[v.app].display : v.group;
      const vRole = ROLES_META[v.role] ? ROLES_META[v.role].display : v.category;
      const isActive = v.id === p.id;
      return `<button class="variant-btn${isActive ? ' active' : ''}"
                      onclick="switchVariant('${esc(v.id)}')"
                      ${isActive ? 'aria-current="true"' : ''}>
        <span class="variant-app">${esc(vApp)}</span>
        <span class="variant-role">${esc(vRole)}</span>
      </button>`;
    }).filter(Boolean).join('');

    variantSelectorHTML = `
      <div class="variant-selector">
        <span class="variant-label">${p.variantCount} variants</span>
        <div class="variant-buttons">${variants}</div>
      </div>`;
  }

  // Body
  const body = document.getElementById('modal-body');
  let metaRows = '';

  if (p.useCase) metaRows += `
    <div class="meta-item">
      <span class="meta-label">Use Case</span>
      <span class="meta-value">${esc(p.useCase)}</span>
    </div>`;

  if (p.personas.length) metaRows += `
    <div class="meta-item">
      <span class="meta-label">Target Personas</span>
      <span class="meta-value">${esc(p.personas.join(', '))}</span>
    </div>`;

  if (p.tags.length) metaRows += `
    <div class="meta-item">
      <span class="meta-label">Tags</span>
      <div class="meta-tags">${p.tags.map(t => `<span class="meta-tag">${esc(t)}</span>`).join('')}</div>
    </div>`;

  let promptSections = '';
  if (p.context) {
    promptSections += `
    <div class="prompt-block">
      <div class="prompt-label">Context</div>
      <div class="prompt-context">${esc(p.context)}</div>
    </div>`;
  }

  promptSections += `
    <div class="prompt-block">
      <div class="prompt-label">Prompt</div>
      <pre class="prompt-code">${esc(p.prompt)}</pre>
    </div>`;

  body.innerHTML = `
    ${variantSelectorHTML}
    <div class="meta-row">${metaRows}</div>
    ${promptSections}`;

  document.getElementById('modal-copy-btn').textContent = '';
  document.getElementById('modal-copy-btn').innerHTML = `${COPY_ICON} Copy Prompt`;
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-copy-btn').focus();
}

function switchVariant(id) {
  openModal(id);
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  state.activePrompt = null;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

function copyModalPrompt() {
  if (!state.activePrompt) return;
  const btn = document.getElementById('modal-copy-btn');
  copyText(state.activePrompt.prompt, null).then(() => {
    btn.innerHTML = `${CHECK_ICON} Copied!`;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = `${COPY_ICON} Copy Prompt`;
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Escape key closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && !document.getElementById('modal-backdrop').classList.contains('open')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// ─── Mobile sidebar ─────────────────────────────────────────────────
const sidebarEl = document.getElementById('sidebar');
const overlayEl = document.getElementById('sidebar-overlay');

document.getElementById('sidebar-toggle').addEventListener('click', () => {
  const open = sidebarEl.classList.toggle('open');
  overlayEl.classList.toggle('open', open);
});

overlayEl.addEventListener('click', closeSidebarMobile);

function closeSidebarMobile() {
  sidebarEl.classList.remove('open');
  overlayEl.classList.remove('open');
}

// ─── PWA / Install ─────────────────────────────────────────────────
let deferredPrompt;
const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.classList.add('visible');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') installBtn.classList.remove('visible');
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => installBtn.classList.remove('visible'));

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Theme ─────────────────────────────────────────────────────────
const THEME_ICONS = {
  system: `<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>`,
  light: `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`,
  dark: `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`
};

function applyTheme(mode) {
  const root = document.documentElement;
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  let effective = mode;
  if (mode === 'system') {
    effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  if (effective === 'dark') {
    root.setAttribute('data-theme', 'dark');
    if (metaTheme) metaTheme.setAttribute('content', '#1E1B4B');
  } else {
    root.removeAttribute('data-theme');
    if (metaTheme) metaTheme.setAttribute('content', '#4F46E5');
  }
  const btn = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-icon');
  if (btn && icon) {
    btn.title = `Theme: ${mode}`;
    btn.setAttribute('aria-label', `Current theme: ${mode}. Click to cycle.`);
    icon.innerHTML = THEME_ICONS[mode];
  }
}

function cycleTheme() {
  const current = localStorage.getItem('theme') || 'system';
  const order = ['system', 'light', 'dark'];
  const next = order[(order.indexOf(current) + 1) % order.length];
  localStorage.setItem('theme', next);
  applyTheme(next);
}

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if ((localStorage.getItem('theme') || 'system') === 'system') {
    applyTheme('system');
  }
});

document.getElementById('theme-toggle').addEventListener('click', cycleTheme);
applyTheme(localStorage.getItem('theme') || 'system');

// ─── Init ──────────────────────────────────────────────────────────
// Update search placeholder with actual count
const searchInput = document.getElementById('search');
if (searchInput) searchInput.placeholder = `Search ${PROMPTS_DATA.length} prompts…`;

buildSidebar();
applyFilter();
</script>
